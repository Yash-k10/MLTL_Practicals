<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision by [Your Name]</title>
    
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .header p {
            font-size: 1.1rem;
            color: #b0c4de;
            font-weight: 300;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: 500;
            color: #00ffcc;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 255, 204, 0.3);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        #video-wrapper {
            position: relative;
            width: 640px; 
            height: 480px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            border: 2px solid rgba(0, 255, 204, 0.3);
            margin-bottom: 20px;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Button Styles */
        #toggle-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #0f2027;
            background-color: #666666; /* Default disabled color */
            border: none;
            border-radius: 30px;
            cursor: not-allowed;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* When button is enabled and ready to start */
        #toggle-btn.ready {
            background-color: #00ffcc;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        #toggle-btn.ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.7);
        }
        /* When detection is active (Stop button) */
        #toggle-btn.active {
            background-color: #ff4c4c;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 76, 76, 0.4);
        }
        #toggle-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 76, 76, 0.7);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI Vision Tracker</h1>
        <p>Developed by <strong>Yash Kapse</strong></p>
    </div>

    <div class="glass-panel">
        <div id="status-container">
            <div id="spinner" class="spinner"></div>
            <span id="status">Initializing webcam...</span>
        </div>
        
        <div id="video-wrapper">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="canvas" width="640" height="480"></canvas>
        </div>

        <button id="toggle-btn" disabled>Loading Model...</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const toggleBtn = document.getElementById('toggle-btn');

        let model;
        let lastLogTime = 0;
        let isDetecting = false; // Tracks if detection is currently running
        let animationId; // Stores the animation frame ID so we can stop it

        async function setupWebcam() {
            return new Promise((resolve, reject) => {
                navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
                    .then(stream => {
                        video.srcObject = stream;
                        video.addEventListener('loadeddata', () => resolve(), false);
                    })
                    .catch(error => reject(error));
            });
        }

        async function detectFrame() {
            // Safety check: if we toggled off, don't run detection
            if (!isDetecting) return;

            const predictions = await model.detect(video);
            
            // Console Logging (Throttled to once per second)
            const currentTime = Date.now();
            if (currentTime - lastLogTime > 1000) {
                if (predictions.length > 0) {
                    const detectedItems = predictions.map(p => `${p.class} (${Math.round(p.score * 100)}%)`);
                    console.log(`🎯 Detected:`, detectedItems.join(', '));
                } else {
                    console.log(`👀 Searching...`);
                }
                lastLogTime = currentTime;
            }

            // Clear the canvas and draw new boxes
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                const text = `${prediction.class} (${Math.round(prediction.score * 100)}%)`;
                
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur = 10;
                ctx.strokeRect(x, y, width, height);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0, 255, 204, 0.8)';
                const textWidth = ctx.measureText(text).width;
                ctx.fillRect(x, y - 30, textWidth + 20, 30);
                
                ctx.fillStyle = '#0f2027';
                ctx.font = 'bold 16px Poppins';
                ctx.fillText(text, x + 10, y - 10);
            });
            
            // Save the animation ID so we can cancel it later
            animationId = requestAnimationFrame(detectFrame);
        }

        // Toggle Button Logic
        toggleBtn.addEventListener('click', () => {
            if (!isDetecting) {
                // START DETECTION
                isDetecting = true;
                toggleBtn.innerText = 'Stop Detection';
                toggleBtn.className = 'active'; // Applies red styling
                statusText.innerText = 'Live Detection Active';
                console.log("▶️ Detection Started");
                detectFrame(); // Kick off the loop
            } else {
                // STOP DETECTION
                isDetecting = false;
                toggleBtn.innerText = 'Start Detection';
                toggleBtn.className = 'ready'; // Applies green styling
                statusText.innerText = 'Camera Ready - Detection Paused';
                console.log("⏸️ Detection Stopped");
                
                // Stop the loop and clear the canvas boxes
                cancelAnimationFrame(animationId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        async function main() {
            try {
                await setupWebcam();
                
                console.log("⚙️ TensorFlow.js is initializing...");
                statusText.innerText = 'Loading AI Model...';
                
                // Load the model
                model = await cocoSsd.load();
                console.log("✅ COCO-SSD Model Loaded Successfully!");
                
                // Update UI to show we are ready to begin
                statusText.innerText = 'Camera Ready. Click Start!';
                spinner.style.display = 'none';
                
                // Enable the button
                toggleBtn.disabled = false;
                toggleBtn.innerText = 'Start Detection';
                toggleBtn.className = 'ready'; 
                
            } catch (error) {
                console.error("❌ Error:", error);
                statusText.innerText = 'Error loading camera or model.';
                spinner.style.display = 'none';
            }
        }

        main();
    </script>

</body>
</html>
