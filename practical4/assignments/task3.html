<!DOCTYPE html>
<html>
<head>
<title>Image Model Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
font-family:Arial;
background:#6B8E23;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#556B2F;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.sub{
color:#f5f5dc;
margin-top:5px;
}

.container{
background:#f5f5dc;
width:700px;
margin:auto;
margin-top:30px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input{
padding:10px;
margin-top:10px;
}

#canvas{
margin-top:20px;
border-radius:10px;
border:2px solid #556B2F;
}

.result{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:8px;
text-align:left;
border-left:6px solid #556B2F;
}

.status{
margin-top:10px;
font-weight:bold;
color:#556B2F;
}

.footer{
margin-top:30px;
color:#eee;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
Image Classification & Object Detection
<div class="sub">MobileNet vs COCO-SSD</div>
</div>

<div class="container">

<h3>Upload an Image</h3>

<input type="file" id="imageUpload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<p id="status" class="status">Loading AI models...</p>

<div class="result">
<h3>MobileNet Predictions</h3>
<div id="mobilenetResult"></div>
</div>

<div class="result">
<h3>COCO-SSD Detected Objects</h3>
<div id="cocoResult"></div>
</div>

</div>

<div class="footer">
Created by <b>Yash Kapse</b>
</div>

<script>

let mobilenetModel;
let cocoModel;

async function loadModels(){

console.log("Loading MobileNet...");
mobilenetModel = await mobilenet.load();

console.log("Loading COCO-SSD...");
cocoModel = await cocoSsd.load();

console.log("Models loaded");

document.getElementById("status").innerText="Models Ready. Upload an image.";

}

loadModels();

document.getElementById("imageUpload").addEventListener("change", async function(event){

const file = event.target.files[0];
const img = new Image();

img.src = URL.createObjectURL(file);

img.onload = async function(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

document.getElementById("status").innerText="Running predictions...";

const mobilePred = await mobilenetModel.classify(img);

console.log("MobileNet:",mobilePred);

let mobileOutput="";

for(let i=0;i<3;i++){

mobileOutput += mobilePred[i].className +
" ("+(mobilePred[i].probability*100).toFixed(2)+"%)<br>";

}

document.getElementById("mobilenetResult").innerHTML = mobileOutput;

const cocoPred = await cocoModel.detect(img);

console.log("COCO-SSD:",cocoPred);

let cocoOutput="";

cocoPred.forEach(p=>{

cocoOutput += p.class + " ("+(p.score*100).toFixed(2)+"%)<br>";

ctx.strokeStyle="red";
ctx.lineWidth=3;
ctx.strokeRect(...p.bbox);

ctx.fillStyle="red";
ctx.fillText(p.class,p.bbox[0],p.bbox[1]-5);

});

document.getElementById("cocoResult").innerHTML = cocoOutput;

document.getElementById("status").innerText="Prediction Completed";

}

});

</script>

</body>
</html>
