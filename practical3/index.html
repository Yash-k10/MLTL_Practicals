```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Sentiment Analyzer</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:35px;
width:520px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
background:#00f2fe;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#4facfe;
}

.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

.score{
margin-top:10px;
font-size:16px;
}

.status{
font-size:14px;
margin-bottom:10px;
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Sentiment Analyzer</h1>

<div id="status">Loading AI model...</div>

<textarea id="inputText" placeholder="Enter text to analyze sentiment"></textarea>

<br>

<button id="analyzeBtn" disabled>Analyze Sentiment</button>

<div class="result" id="result"></div>
<div class="score" id="score"></div>

<div class="footer">
Created by <b>Yash Kapse</b> 🚀
</div>

</div>

<script type="module">

import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let classifier;

async function loadModel(){

console.log("Loading pretrained sentiment model...");

classifier = await pipeline(
"sentiment-analysis",
"Xenova/distilbert-base-uncased-finetuned-sst-2-english"
);

console.log("Model Loaded Successfully");

document.getElementById("status").innerText="AI Model Loaded ✓";
document.getElementById("analyzeBtn").disabled=false;

}

await loadModel();

document.getElementById("analyzeBtn").onclick = async () => {

let text=document.getElementById("inputText").value;

if(text.trim()===""){
alert("Please enter text");
return;
}

console.log("Input:",text);

const result = await classifier(text);

console.log("Prediction:",result);

let label=result[0].label;
let score=(result[0].score*100).toFixed(2);

let emoji = label==="POSITIVE" ? "😊" : "😡";

document.getElementById("result").innerHTML=
"Sentiment: "+label+" "+emoji;

document.getElementById("score").innerHTML=
"Confidence: "+score+"%";

};

</script>

</body>
</html>
